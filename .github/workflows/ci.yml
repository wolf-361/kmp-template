name: CI

on:
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Import checks · Tests · Assemble
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Spotless check
        run: ./gradlew spotlessCheck --no-daemon

      - name: Detekt — code quality
        run: ./gradlew :shared:detekt --no-daemon

      - name: Detekt — domain layer imports
        run: ./gradlew :shared:detektDomainImports --no-daemon

      - name: Detekt — presentation layer imports
        run: ./gradlew :shared:detektPresentationImports --no-daemon

      - name: Unit tests
        run: ./gradlew :shared:testDebugUnitTest --no-daemon

      - name: Assemble debug
        run: ./gradlew :composeApp:assembleDebug --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/'
          retention-days: 7

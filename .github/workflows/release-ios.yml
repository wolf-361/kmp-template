name: Release iOS

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  deploy:
    name: Build & publish to TestFlight
    # macOS runner costs ~10× more than ubuntu — only used on tag push, never on PRs
    runs-on: macos-latest
    # Uncomment to switch to a self-hosted Mac Mini (eliminates macOS runner costs):
    # runs-on: [self-hosted, macOS, Xcode]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p fastlane
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > fastlane/api_key.json

      - name: Deploy via Fastlane
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane ios deploy
